        <p class="hero-description">
            Halo, saya <strong>Desti</strong>. Seorang Pengembang Web yang berdedikasi membangun sistem informasi manajemen yang presisi, efisien, dan memiliki estetika modern.
        </p>
        
        <div class="hero-actions">
            <a href="#" class="btn-primary menu" data-page="portfolio.html">View Projects</a>
            <a href="#" class="btn-outline menu" data-page="about.html">About Me</a>
        </div>

        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-num">01+</span>
                <span class="stat-label">Years Exp.</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">10+</span>
                <span class="stat-label">Projects</span>
            </div>
        </div>
    </div>

    <div class="hero-visual">
        <div class="image-stack">
            <div class="image-bg-shape"></div>
            <div class="profile-frame">
                <img src="d.jpeg" alt="Desti">

        </div>
    </div>
</div>

<style>
    .hero-wrapper {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 60px;
        align-items: center;
        padding: 40px 0;
        animation: fadeIn 0.8s ease-out;
    }

    /* TEXT STYLING */
    .badge {
        display: inline-block;
        padding: 6px 16px;
        background: rgba(99, 102, 241, 0.1);
        color: #6366f1;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
        border: 1px solid rgba(99, 102, 241, 0.2);
    }

    h1.glitch-text {
        font-family: 'Syne', sans-serif;
        font-size: clamp(3rem, 5vw, 4.5rem);
        line-height: 1.1;
        margin-bottom: 25px;
        color: #f8fafc;
    }

    h1 span {
        color: #6366f1;
        background: linear-gradient(90deg, #6366f1, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-description {
        font-size: 1.1rem;
        color: #94a3b8;
        max-width: 500px;
        margin-bottom: 35px;
    }

    /* BUTTONS */
    .hero-actions {
        display: flex;
        gap: 20px;
        margin-bottom: 50px;
    }

    .btn-primary {
        background: #6366f1;
        color: white;
        padding: 14px 28px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-outline {
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
        padding: 14px 28px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-primary:hover { background: #4f46e5; transform: translateY(-3px); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }

    /* STATS */
    .hero-stats {
        display: flex;
        gap: 40px;
    }

    .stat-num {
        display: block;
        font-size: 1.5rem;
        font-weight: 700;
        color: #f8fafc;
    }

    .stat-label {
        color: #64748b;
        font-size: 0.85rem;
    }

    /* VISUAL / IMAGE STYLING */
    .hero-visual {
        position: relative;
    }

    .image-stack {
        position: relative;
        width: 320px;
        height: 400px;
        margin: 0 auto;
    }

    .profile-frame {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .profile-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .image-bg-shape {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #6366f1;
        top: 20px;
        right: -20px;
        z-index: 1;
        border-radius: 24px;
        opacity: 0.2;
        filter: blur(40px);
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
        .hero-wrapper {
            grid-template-columns: 1fr;
            text-align: center;
        }
        .hero-description { margin: 0 auto 35px auto; }
        .hero-actions, .hero-stats { justify-content: center; }
        .image-stack { width: 280px; height: 350px; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
