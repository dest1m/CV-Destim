<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desti | Portfolio SPA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        /* ========================================================
           Kustomisasi CSS Menu Dropdown Mobile yang Ringkas & Rapi 
           ======================================================== */
        @media (max-width: 768px) {
            /* Menghilangkan navigasi horizontal bawaan desktop */
            .nav-links {
                display: none; /* Tersembunyi sebelum tombol diklik */
                position: absolute;
                top: 60px; /* Jarak pas di bawah batas bar navigasi utama */
                right: 20px; /* Memberikan space manis dari sudut kanan layar */
                width: 220px; /* Lebar kotak menu yang ringkas & tidak memblokir layar */
                background: #ffffff;
                border-radius: 14px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); /* Efek bayangan melayang premium */
                border: 1px solid #eef0f5;
                padding: 10px 0;
                margin: 0;
                list-style: none;
                flex-direction: column;
                gap: 0;
                z-index: 1000;
                opacity: 0;
                transform: translateY(-10px); /* Efek awal sedikit di atas untuk animasi */
                transition: opacity 0.25s ease, transform 0.25s ease;
            }

            /* Saat kelas .open ditambahkan oleh pemicu jQuery */
            .nav-links.open {
                display: flex;
                opacity: 1;
                transform: translateY(0); /* Meluncur turun pas ke posisi semula */
            }

            .nav-links li {
                width: 100%;
                text-align: left; /* Teks rata kiri rapi khas menu gawai */
            }

            /* Area sentuh tombol menu yang lega & pas untuk jari di HP */
            .nav-links li a {
                font-family: 'Poppins', sans-serif;
                font-size: 15px;
                font-weight: 500;
                color: #4a5568 !important;
                display: block;
                padding: 12px 20px;
                transition: all 0.2s ease;
                text-decoration: none;
                border-radius: 0;
            }

            /* Efek ketika menu disentuh kursor atau berstatus aktif */
            .nav-links li a.active, .nav-links li a:hover {
                color: #0066cc !important; /* Warna aksen Royal Blue profesional */
                background: #f4f9ff; /* Highlight latar belakang biru transparan lembut */
                font-weight: 600;
            }

            /* Garis pembatas khusus untuk tombol kontak di bagian bawah */
            .nav-links li a.contact-btn {
                border-top: 1px solid #f0f2f5;
                color: #0066cc !important;
            }

            /* Pengaturan ukuran tombol hamburger agar proporsional */
            .hamburger {
                font-size: 24px;
                cursor: pointer;
                color: #1a1a1a;
                padding: 5px;
                user-select: none;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Desti<span>.Dev</span></a>
    <ul class="nav-links">
        <li><a href="#" class="menu active" data-page="home.html">Home</a></li>
        <li><a href="#" class="menu" data-page="about.html">About</a></li>
        <li><a href="#" class="menu" data-page="skills.html">Skills</a></li>
        <li><a href="#" class="menu" data-page="experience.html">Experience</a></li>
        <li><a href="#" class="menu" data-page="education.html">Education</a></li>
        <li><a href="#" class="menu" data-page="portfolio.html">Portfolio</a></li>
        <li><a href="#" class="menu" data-page="certificate.html">Certificate</a></li>
        <li><a href="#" class="menu" data-page="github.html">Github</a></li>
        <li><a href="#" class="menu contact-btn" data-page="contact.html">Contact</a></li>
    </ul>
    <div class="hamburger">&#9776;</div>
</nav>

<main id="content-wrapper">
    <div id="content"></div>
</main>

<script>
$(document).ready(function(){
    // 1. Registrasi Service Worker PWA (Syarat Penilaian Level 9)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Registered!'))
                .catch(err => console.log('PWA Registration Failed!', err));
        });
    }

    // 2. Fungsi Utama Jalur Pemuatan Halaman SPA (Single Page Application)
    function loadPage(page){
        $("#content").animate({ opacity: 0 }, 200, function(){
            $.ajax({
                url: page,
                cache: false,
                success: function(response) {
                    $("#content").html(response).animate({ opacity: 1 }, 300);
                    $(window).scrollTop(0);
                }
            });
        });
    }

    // Membuka halaman "Home" secara otomatis saat awal load
    loadPage("home.html");

    // 3. Aksi Klik Tautan Menu Navigasi
    $(document).on("click", ".menu", function(e){
        e.preventDefault();
        $(".nav-links li a").removeClass("active");
        $(this).addClass("active");
        
        let page = $(this).attr("data-page");
        loadPage(page);
        
        // Menutup menu dropdown secara otomatis setelah halaman dipilih
        $(".nav-links").removeClass("open");
    });

    // 4. Pemicu Tombol Hamburger (Buka / Tutup)
    $(".hamburger").click(function(e){ 
        e.stopPropagation(); /* Mencegah penutupan instan akibat bentrok klik dokumen */
        $(".nav-links").toggleClass("open"); 
    });

    // 5. Fitur Auto-Dismiss (Klik di luar area menu untuk otomatis menutup dropdown)
    $(document).click(function(e) {
        if (!$(e.target).closest('.navbar').length) {
            $(".nav-links").removeClass("open");
        }
    });
});
</script>
</body>
</html>
