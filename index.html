<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desti | Portfolio SPA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        /* ========================================================
           Kustomisasi CSS Menu Dropdown Gawai: Posisi di Tengah Layar
           ======================================================== */
        @media (max-width: 768px) {
            .nav-links {
                display: none; 
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: rgba(0, 0, 0, 0.4); 
                backdrop-filter: blur(4px); 
                justify-content: center;
                align-items: center;
                z-index: 2000;
                opacity: 0;
                transition: opacity 0.3s ease;
                padding: 0;
                margin: 0;
                list-style: none;
                flex-direction: column;
                gap: 0;
            }

            .nav-links.open {
                display: flex;
                opacity: 1;
            }

            .nav-links li {
                width: 85%; 
                max-width: 320px; 
                background: #ffffff;
                text-align: center; 
            }

            .nav-links li:first-child {
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
                padding-top: 10px;
            }
            .nav-links li:last-child {
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px;
                padding-bottom: 10px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); 
            }

            .nav-links li a {
                font-family: 'Poppins', sans-serif;
                font-size: 16px; 
                font-weight: 500;
                color: #4a5568 !important;
                display: block;
                padding: 14px 20px; 
                transition: all 0.2s ease;
                text-decoration: none;
            }

            .nav-links li a.active, .nav-links li a:hover {
                color: #0066cc !important; 
                background: #f4f9ff; 
                font-weight: 600;
            }

            .nav-links li a.contact-btn {
                border-top: 1px solid #f0f2f5;
                color: #0066cc !important;
            }

            .hamburger {
                font-size: 26px;
                cursor: pointer;
                color: #1a1a1a;
                padding: 5px;
                user-select: none;
                position: relative;
                z-index: 2100; 
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Desti<span>.Dev</span></a>
    <ul class="nav-links">
        <li><a href="#" class="menu active" data-page="home.html">Home</a></li>
        <li><a href="#" class="menu" data-page="about.html">About</a></li>
        <li><a href="#" class="menu" data-page="skills.html">Skills</a></li>
        <li><a href="#" class="menu" data-page="experience.html">Experience</a></li>
        <li><a href="#" class="menu" data-page="education.html">Education</a></li>
        <li><a href="#" class="menu" data-page="portfolio.html">Portfolio</a></li>
        <li><a href="#" class="menu" data-page="certificate.html">Certificate</a></li>
        <li><a href="#" class="menu" data-page="github.html">Github</a></li>
        <li><a href="#" class="menu contact-btn" data-page="contact.html">Contact</a></li>
    </ul>
    <div class="hamburger">&#9776;</div>
</nav>

<main id="content-wrapper">
    <div id="content"></div>
</main>

<script>
$(document).ready(function(){
    // 1. Registrasi Service Worker PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Registered!'))
                .catch(err => console.log('PWA Registration Failed!', err));
        });
    }

    // 2. Fungsi Utama Jalur Pemuatan Halaman SPA
    function loadPage(page){
        $("#content").animate({ opacity: 0 }, 200, function(){
            $.ajax({
                url: page,
                cache: false,
                success: function(response) {
                    $("#content").html(response).animate({ opacity: 1 }, 300);
                    $(window).scrollTop(0);
                }
            });
        });
    }

    loadPage("home.html");

    // 3. Aksi Klik Tautan Menu Navigasi
    $(document).on("click", ".menu", function(e){
        e.preventDefault();
        $(".nav-links li a").removeClass("active");
        $(this).addClass("active");
        
        let page = $(this).attr("data-page");
        loadPage(page);
        
        $(".nav-links").removeClass("open");
    });

    // 4. Pemicu Tombol Hamburger (Buka / Tutup)
    $(".hamburger").click(function(e){ 
        e.stopPropagation(); 
        $(".nav-links").toggleClass("open"); 
    });

    // 5. Fitur Auto-Dismiss (Klik area gelap di luar menu untuk otomatis menutup)
    $(document).click(function(e) {
        if (!$(e.target).closest('.nav-links li').length && !$(e.target).closest('.hamburger').length) {
            $(".nav-links").removeClass("open");
        }
    });
});
</script>
</body>
</html>
